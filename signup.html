<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign Up – AFTeen SecLabs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <!-- Load secure config -->
  <script src="/firebase-config.js"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-6">

  <div class="max-w-md w-full bg-gray-900 rounded-2xl p-10 shadow-2xl border border-cyan-900/40">

    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold text-cyan-400">AFTeen SecLabs</h1>
      <p class="text-xl text-gray-400 mt-2">Create Your Free Account</p>
    </div>

    <div id="error-message" class="hidden bg-red-900/50 border border-red-700 text-red-200 p-4 rounded-lg mb-6 text-center"></div>
    <div id="success-message" class="hidden bg-green-900/50 border border-green-700 text-green-200 p-4 rounded-lg mb-6 text-center"></div>

    <form id="signup-form" class="space-y-6">
      <div>
        <label for="email" class="block text-gray-300 mb-2 font-medium">Email Address</label>
        <input id="email" type="email" required class="w-full p-4 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/30 text-white placeholder-gray-500" placeholder="you@example.com">
      </div>

      <div>
        <label for="password" class="block text-gray-300 mb-2 font-medium">Password</label>
        <input id="password" type="password" required minlength="6" class="w-full p-4 bg-gray-800 border border-gray-700 rounded-lg focus:outline-none focus:border-cyan-500 focus:ring-2 focus:ring-cyan-500/30 text-white placeholder-gray-500" placeholder="At least 6 characters">
      </div>

      <button type="submit" class="w-full bg-cyan-500 hover:bg-cyan-600 text-black font-bold py-4 px-8 rounded-full text-lg transition">
        Sign Up with Email
      </button>
    </form>

    <div class="my-8 text-center text-gray-500">— or —</div>

    <button id="google-signup" class="w-full bg-white hover:bg-gray-100 text-gray-900 font-medium py-4 px-8 rounded-full text-lg transition flex items-center justify-center gap-3 border border-gray-300">
      <svg class="w-6 h-6" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.51h5.84c-.25 1.31-.98 2.42-2.07 3.16v2.63h3.35c1.96-1.81 3.1-4.46 3.1-7.99z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.35-2.63c-.98.66-2.23 1.06-3.93 1.06-3.02 0-5.58-2.04-6.49-4.79H.96v2.67C2.74 20.99 7.02 23 12 23z"/><path fill="#FBBC05" d="M5.51 14.21c-.23-.66-.36-1.37-.36-2.21s.13-1.55.36-2.21V7.34H.96C.35 8.85 0 10.39 0 12s.35 3.15.96 4.66l4.55-2.45z"/><path fill="#EA4335" d="M12 4.98c1.64 0 3.11.56 4.27 1.66l3.19-3.19C17.46 1.01 14.97 0 12 0 7.02 0 2.74 2.01.96 5.34l4.55 2.45C6.42 5.02 8.98 4.98 12 4.98z"/></svg>
      Sign Up with Google
    </button>

    <p class="text-center mt-8 text-gray-400">
      Already have an account? 
      <a href="/login.html" class="text-cyan-400 hover:text-cyan-300 font-medium">Log in</a>
    </p>

  </div>

  <script>
    firebase.initializeApp(window.firebaseConfig);
    const auth = firebase.auth();

    // Email/Password Signup
    document.getElementById('signup-form').addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      auth.createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          showSuccess("Account created successfully! Redirecting to dashboard...");
          setTimeout(() => window.location.href = '/dashboard.html', 2000);
        })
        .catch((error) => showError(error.message));
    });

    // Google Sign-In
    document.getElementById('google-signup').addEventListener('click', () => {
      const provider = new firebase.auth.GoogleAuthProvider();
      auth.signInWithPopup(provider)
        .then((result) => {
          showSuccess("Signed up with Google! Redirecting...");
          setTimeout(() => window.location.href = '/dashboard.html', 2000);
        })
        .catch((error) => showError(error.message));
    });

    function showError(msg) {
      const el = document.getElementById('error-message');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }

    function showSuccess(msg) {
      const el = document.getElementById('success-message');
      el.textContent = msg;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), 5000);
    }
  </script>

</body>
</html>
