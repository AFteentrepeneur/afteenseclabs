<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard – AFTeen SecLabs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script src="/firebase-config.js"></script>
</head>
<body class="bg-gray-950 text-white min-h-screen flex items-center justify-center p-6">

  <div class="max-w-2xl text-center bg-gray-900 rounded-2xl p-12 border border-cyan-900/40 shadow-2xl">

    <h1 class="text-5xl font-bold mb-6">
      Welcome, <span id="user-name" class="text-cyan-400">Cadet</span>!
    </h1>

    <p class="text-xl text-gray-300 mb-10">
      You're now part of AFTeen SecLabs — forging Africa's next cyber defenders.
    </p>

    <div class="bg-gray-800 p-8 rounded-xl mb-12 border border-gray-700">
      <h3 class="text-2xl font-semibold mb-4 text-cyan-400">Your Progress</h3>
      <p id="points-display" class="text-4xl font-bold text-cyan-400">0 points</p>
      <p class="text-gray-400 mt-2">Labs completed: 1 (Recon Mission 1)</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
      <a href="/labs/recon-mission-1.html" class="bg-gray-800 hover:bg-gray-700 p-6 rounded-xl border border-cyan-800/50 transition text-center">
        <h3 class="text-xl font-semibold text-cyan-400 mb-2">Continue Recon Mission 1</h3>
        <p class="text-gray-400">OSINT Investigation</p>
      </a>
      <a href="/labs/recon-mission-2.html" class="bg-gray-800 hover:bg-gray-700 p-6 rounded-xl border border-cyan-800/50 transition text-center">
        <h3 class="text-xl font-semibold text-cyan-400 mb-2">Recon Mission 2</h3>
        <p class="text-gray-400">Subdomain Discovery</p>
      </a>
    </div>

    <button id="logout-btn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-10 rounded-full text-lg transition">
      Log Out
    </button>

  </div>

  <script>
    firebase.initializeApp(window.firebaseConfig);
    const auth = firebase.auth();

    auth.onAuthStateChanged((user) => {
      if (user) {
        document.getElementById('user-name').textContent = user.displayName || user.email.split('@')[0];
      } else {
        window.location.href = '/login.html';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', () => {
      auth.signOut().then(() => window.location.href = '/');
    });

    // Load points from localStorage
    let totalPoints = parseInt(localStorage.getItem('recon1_points') || '0') + 
                      parseInt(localStorage.getItem('recon2_points') || '0');
    document.getElementById('points-display').textContent = `${totalPoints} points`;
  </script>

</body>
</html>
